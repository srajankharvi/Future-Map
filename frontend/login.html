<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Future Map</title>
    <meta name="description" content="Login or create an account to access Future Map career and course guidance.">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Future Map</h1>
                <p>Career & Course Guidance</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="#" data-action="toggle-signup">Sign up here</a></p>
            </div>
        </div>

        <!-- Signup Form -->
        <div class="signup-box hidden" id="signupBox">
            <div class="login-header">
                <h1>Create Account</h1>
                <p>Join Future Map Today</p>
            </div>

            <form id="signupForm" class="login-form">
                <div class="form-group">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" name="signupUsername" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" name="signupEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" name="signupPassword" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" name="signupConfirmPassword" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="#" data-action="toggle-signup">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="js/main.js" defer></script>
    <script src="js/login.js" defer></script>
</body>
</html>
